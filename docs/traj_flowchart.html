<body>
<svg width="100%" viewBox="0 0 680 1740" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

<!-- GEOMETRY NOTE -->
<g class="c-gray">
<rect x="40" y="18" width="600" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="36" text-anchor="middle" dominant-baseline="central">Geometry differs; all logic below is identical</text>
<text class="ts" x="340" y="54" text-anchor="middle" dominant-baseline="central">hap: H = R &#8722; AG &#8722; AP &#183; normal radial outward &#160;|&#160; jet: H = Z &#8722; AP &#183; normal vertical (Z axis)</text>
</g>

<!-- INITIALISE -->
<g class="node c-purple">
<rect x="220" y="90" width="240" height="44" rx="8" stroke-width="0.5"/>

</g>
<line x1="340" y1="134" x2="340" y2="158" class="arr" marker-end="url(#arrow)"/>

<!-- COMPUTE HFRIC / HMIN -->
<g class="node c-purple">
<rect x="200" y="158" width="280" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="174" text-anchor="middle" dominant-baseline="central">Compute HFRIC &amp; HMIN</text>
<text class="ts" x="340" y="191" text-anchor="middle" dominant-baseline="central">brentq root-find; set DELTAMAX</text>
</g>
<line x1="340" y1="202" x2="340" y2="226" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="223" text-anchor="middle" dominant-baseline="central">while ATTACHK == 0</text>

<!-- FORCES -->
<g class="node c-teal">
<rect x="180" y="230" width="320" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="250" text-anchor="middle" dominant-baseline="central">Compute forces</text>
<text class="ts" x="340" y="268" text-anchor="middle" dominant-baseline="central">VDW &#183; EDL &#183; Born &#183; AB &#183; Steric &#183; Drag &#183; Diff &#183; Gravity &#183; Lift</text>
</g>
<line x1="340" y1="286" x2="340" y2="318" class="arr" marker-end="url(#arrow)"/>

<!-- HETDOMAIN -->
<g class="node c-teal">
<rect x="200" y="318" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="338" text-anchor="middle" dominant-baseline="central">Heterodomain EDL (HFLAG &gt; 1)</text>
<text class="ts" x="340" y="356" text-anchor="middle" dominant-baseline="central">Compute AFRACT; blend FEDL if SCOV &gt; 0</text>
</g>
<line x1="340" y1="374" x2="340" y2="406" class="arr" marker-end="url(#arrow)"/>

<!-- ZONE DECISION -->
<g class="node c-amber">
<rect x="214" y="406" width="252" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="428" text-anchor="middle" dominant-baseline="central">Which zone?  H vs HNS / HFRIC</text>
</g>

<text class="ts" x="118" y="482" text-anchor="middle">H &gt; HNS</text>
<text class="ts" x="340" y="482" text-anchor="middle">HFRIC &lt; H &#8804; HNS</text>
<text class="ts" x="562" y="482" text-anchor="middle">H &#8804; HFRIC</text>
<path d="M240 450 L118 450 L118 496" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="450" x2="340" y2="496" class="arr" marker-end="url(#arrow)"/>
<path d="M440 450 L562 450 L562 496" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- BULK -->
<g class="node c-blue">
<rect x="44" y="496" width="148" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="118" y="516" text-anchor="middle" dominant-baseline="central">Bulk  (HFLAG=1)</text>
<text class="ts" x="118" y="534" text-anchor="middle" dominant-baseline="central">dT = MULTB &#215; dTMRT</text>
</g>

<!-- NEAR-SURFACE -->
<g class="node c-blue">
<rect x="224" y="496" width="232" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="516" text-anchor="middle" dominant-baseline="central">Near-surface  (HFLAG=2)</text>
<text class="ts" x="340" y="534" text-anchor="middle" dominant-baseline="central">dT = MULTNS &#215; dTMRT; IREF1++</text>
</g>

<!-- CONTACT -->
<g class="node c-blue">
<rect x="476" y="496" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="556" y="516" text-anchor="middle" dominant-baseline="central">Contact  (HFLAG=3)</text>
<text class="ts" x="556" y="534" text-anchor="middle" dominant-baseline="central">dT = MULTC &#215; dTMRT; IREF2++</text>
</g>

<line x1="118" y1="552" x2="118" y2="590" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="552" x2="340" y2="590" class="arr" marker-end="url(#arrow)"/>
<line x1="556" y1="552" x2="556" y2="590" class="arr" marker-end="url(#arrow)"/>

<!-- EXIT CHECK -->
<g class="node c-amber">
<rect x="44" y="590" width="148" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="118" y="610" text-anchor="middle" dominant-baseline="central">Exit domain?</text>
<text class="ts" x="118" y="628" text-anchor="middle" dominant-baseline="central">hap: R &gt; RB  |  jet: R &gt; REXIT</text>
</g>

<g class="node c-amber">
<rect x="214" y="590" width="252" height="56" rx="8" stroke-width="0.5"/>

<text class="ts" x="340" y="628" text-anchor="middle" dominant-baseline="central">3D &#916;pos &lt; DFACTNS &#215; diffusion scale</text>
</g>

<!-- ATTMODE SPLIT -->
<g class="node c-amber">
<rect x="476" y="590" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="556" y="610" text-anchor="middle" dominant-baseline="central">ATTMODE?</text>
<text class="ts" x="556" y="628" text-anchor="middle" dominant-baseline="central">0 = perfect sink; 1 = torque-balance</text>
</g>

<line x1="118" y1="646" x2="118" y2="686" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="646" x2="340" y2="686" class="arr" marker-end="url(#arrow)"/>
<line x1="556" y1="646" x2="556" y2="686" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="84" y="684">yes</text>
<text class="ts" x="306" y="684">yes</text>

<!-- ATTACHK=1 -->
<g class="node c-coral">
<rect x="44" y="686" width="148" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="118" y="702" text-anchor="middle" dominant-baseline="central">ATTACHK = 1</text>
<text class="ts" x="118" y="719" text-anchor="middle" dominant-baseline="central">Exit domain</text>
</g>

<!-- ATTACHK=5 -->
<g class="node c-coral">
<rect x="214" y="686" width="252" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="702" text-anchor="middle" dominant-baseline="central">ATTACHK = 5</text>
<text class="ts" x="340" y="719" text-anchor="middle" dominant-baseline="central">Retained &#8212; near-surface slow-motion</text>
</g>

<text class="ts" x="516" y="684">0</text>
<text class="ts" x="590" y="684">1</text>
<path d="M536 646 L510 646 L510 686" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M576 646 L604 646 L604 686" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ATTMODE=0 ATTACHK=2 -->
<g class="node c-coral">
<rect x="468" y="686" width="80" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="508" y="702" text-anchor="middle" dominant-baseline="central">ATTACHK=2</text>
<text class="ts" x="508" y="719" text-anchor="middle" dominant-baseline="central">Perfect sink</text>
</g>

<!-- TORQUE BALANCE -->
<g class="node c-teal">
<rect x="560" y="686" width="88" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="604" y="704" text-anchor="middle" dominant-baseline="central">Torque balance</text>
<text class="ts" x="604" y="722" text-anchor="middle" dominant-baseline="central">Update UT via</text>
<text class="ts" x="604" y="736" text-anchor="middle" dominant-baseline="central">rolling eqn.</text>
</g>
<line x1="604" y1="742" x2="604" y2="772" class="arr" marker-end="url(#arrow)"/>

<!-- UT < 0 -->
<g class="node c-amber">
<rect x="556" y="772" width="96" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="604" y="788" text-anchor="middle" dominant-baseline="central">UT &lt; 0?</text>
<text class="ts" x="604" y="806" text-anchor="middle" dominant-baseline="central">Clamp; set ARRESTFLAG</text>
</g>
<line x1="604" y1="816" x2="604" y2="848" class="arr" marker-end="url(#arrow)"/>

<!-- EQUILIBRIUM -->
<g class="node c-amber">
<rect x="548" y="848" width="112" height="56" rx="8" stroke-width="0.5"/>

<text class="ts" x="604" y="898" text-anchor="middle" dominant-baseline="central">reset if not yet at equil.</text>
</g>
<line x1="604" y1="904" x2="604" y2="934" class="arr" marker-end="url(#arrow)"/>

<!-- ATTACHK=2 arrest -->
<g class="node c-coral">
<rect x="560" y="934" width="88" height="44" rx="8" stroke-width="0.5"/>

<text class="ts" x="604" y="967" text-anchor="middle" dominant-baseline="central">Arrest</text>
</g>

<!-- path from arrest to slow-motion -->

<text class="ts" x="604" y="1058" text-anchor="middle" dominant-baseline="central">&#916;pos &lt; DFACTC &#215; diffusion</text>
</g>
<line x1="604" y1="1062" x2="604" y2="1092" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="612" y="1089">yes</text>

<!-- ATTACHK=4 -->
<g class="node c-coral">
<rect x="560" y="1092" width="88" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="604" y="1108" text-anchor="middle" dominant-baseline="central">ATTACHK = 4</text>
<text class="ts" x="604" y="1125" text-anchor="middle" dominant-baseline="central">Contact slow-motion</text>
</g>

<!-- H < H0 crash -->
<path d="M604 1136 L604 1162" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<g class="node c-red">
<rect x="556" y="1162" width="96" height="44" rx="8" stroke-width="0.5"/>

<text class="ts" x="604" y="1196" text-anchor="middle" dominant-baseline="central">ATTACHK = 6 crash</text>

<text class="ts" x="348" y="1076">no attachment yet</text>
<path d="M340 1080 L340 1162" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<g class="node c-amber">
<rect x="200" y="1162" width="280" height="44" rx="8" stroke-width="0.5"/>

</g>
<line x1="340" y1="1206" x2="340" y2="1236" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="348" y="1232">yes</text>

<!-- ATTACHK=3 -->
<g class="node c-coral">
<rect x="236" y="1236" width="208" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="1252" text-anchor="middle" dominant-baseline="central">ATTACHK = 3</text>
<text class="ts" x="340" y="1269" text-anchor="middle" dominant-baseline="central">Remaining &#8212; time expired</text>

<text class="ts" x="484" y="1202">no</text>

<path d="M548 1034 L460 1034 L460 1358 L480 1358" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="454" y="1030" text-anchor="end">no &#8594; continue</text>

<!-- SPEED COMPARISON NOTE -->
<g class="c-gray">
<rect x="40" y="1416" width="600" height="192" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="1438" text-anchor="middle" dominant-baseline="central">Per-step speed: traj_jet.py vs traj_hap.py</text>
<text class="ts" x="340" y="1458" text-anchor="middle" dominant-baseline="central">traj_jet.py is faster per timestep due to simpler geometry &#8212; not a code quality difference</text>
<text class="ts" x="60" y="1480">Flow field</text>
<text class="ts" x="148" y="1480">jet: polynomial, 14 coeffs pre-computed once</text>
<text class="ts" x="148" y="1494">hap: analytic Stokes evaluated every step</text>
<text class="ts" x="60" y="1514">Gravity</text>
<text class="ts" x="148" y="1514">jet: scalar added to UZ</text>
<text class="ts" x="148" y="1528">hap: gravvect() &#8212; full normal/tangential decomposition per step</text>
<text class="ts" x="60" y="1548">Velocity</text>
<text class="ts" x="148" y="1548">jet: 3 scalar updates (UX, UY, UZ)</text>
<text class="ts" x="148" y="1562">hap: decompose &#8594; normal/tangential update &#8594; recompose</text>
<text class="ts" x="60" y="1582">Heterodomains</text>
<text class="ts" x="148" y="1582">jet: 2D polar on flat surface (no rotation)</text>
<text class="ts" x="148" y="1596">hap: quaternion 3D rotation to sphere tangent plane &#8212; evaluated every NS step</text>
</g>
